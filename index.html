<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#18181b" />
  <meta name="description" content="Connected Battery CF App for electrode mass, standards, C-rate and CF current calculations." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css?v=9" />
  <title>Battery CF App</title>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div>
        <h1>Battery CF App</h1>
        <p>Fast electrode mass → AM loading → C-rate currents. Data stays local on this device.</p>
      </div>
      <div class="top-actions">
        <button id="newElectrodeTop" class="btn primary">+ Electrode</button>
        <button id="newBatchTop" class="btn primary">+ Batch</button>
        <button id="exportBtn" class="btn">Export</button>
        <label class="btn">Import<input id="importFile" type="file" accept="application/json,.json" hidden /></label>
      </div>
    </header>

    <nav id="tabs" class="tabs"></nav>
    <main id="app"></main>
  </div>

  <script src="app.js?v=9"></script>
  <script src="patch-library-order.js?v=9"></script>
  <script src="patch-input-focus.js?v=9"></script>
</body>
</html>
