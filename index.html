<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#18181b" />
  <meta name="description" content="Connected Battery CF App: Materialien, Batches, Elektroden und C-Rate-Rechner." />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Connected Battery CF App</title>
  <style>
    :root{--bg:#09090b;--card:#18181b;--card2:#0f0f12;--muted:#a1a1aa;--line:#27272a;--line2:#3f3f46;--violet:#7c3aed;--violet2:#8b5cf6;--yellow:#fef08a;--red:#fca5a5;--green:#86efac;--text:#f4f4f5;--darkText:#18181b;}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;line-height:1.35} button,input,select,textarea{font:inherit} button{cursor:pointer;color:inherit;border:0} .wrap{max-width:1280px;margin:0 auto;padding:12px}.hero,.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 40px rgba(0,0,0,.25)}.hero{padding:18px}.title{font-size:clamp(24px,4vw,34px);font-weight:750;margin:0}.sub{color:var(--muted);margin:6px 0 0}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.spread{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:center}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;padding:10px 14px;background:#27272a;border:1px solid var(--line2);font-weight:650}.btn:hover{background:#3f3f46}.btn.primary{background:var(--violet);border-color:var(--violet)}.btn.primary:hover{background:var(--violet2)}.btn.danger{background:#3f1216;border-color:#7f1d1d;color:#fecaca}.tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 0}.tab{white-space:nowrap;border-radius:12px;background:var(--card);border:1px solid var(--line);padding:10px 16px;color:#d4d4d8;font-weight:700}.tab.active{background:var(--violet);border-color:var(--violet);color:white}.grid{display:grid;gap:12px}.layout{grid-template-columns:1fr}.card{padding:16px}.section-title{font-size:20px;font-weight:750;margin:0 0 14px}.small{font-size:12px;color:#71717a}.muted{color:var(--muted)}.picker-list{max-height:55vh;overflow:auto;display:grid;gap:8px;padding-right:2px}.pick{width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px}.pick.active{border-color:var(--violet2);background:rgba(124,58,237,.13)}.pick b{display:block}.pick span{display:block;color:var(--muted);font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.field{display:block}.field span{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}.field input,.field select,.field textarea,.search{width:100%;border-radius:13px;background:var(--card2);border:1px solid var(--line2);color:var(--text);padding:12px;outline:0}.field textarea{min-height:76px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus,.search:focus{border-color:var(--violet2)}.field.primary input{background:var(--yellow);border-color:#fde047;color:var(--darkText);font-size:18px;font-weight:750}.form-grid{display:grid;grid-template-columns:1fr;gap:12px}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px}.kpi{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px}.kpi.hot{border-color:rgba(139,92,246,.7);background:rgba(124,58,237,.13)}.kpi .l{font-size:13px;color:var(--muted)}.kpi .v{font-size:clamp(20px,4vw,28px);font-weight:800;font-variant-numeric:tabular-nums;margin-top:4px}.info{border:1px solid var(--line);border-radius:14px;overflow:hidden}.info-row{display:grid;grid-template-columns:128px 1fr;border-bottom:1px solid var(--line);font-size:13px}.info-row:last-child{border-bottom:0}.info-k{background:var(--card2);color:var(--muted);padding:9px}.info-v{padding:9px;overflow-wrap:anywhere}.rates{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rate{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px}.rate .l{font-size:12px;color:var(--muted)}.rate .v{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}.copybox{width:100%;min-height:110px;border-radius:14px;background:var(--card2);border:1px solid var(--line);color:var(--text);padding:12px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:13px}.manager-list{display:grid;gap:12px}.manager-item{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:14px}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;font-size:13px}.table th{color:var(--muted);text-align:left}.table th,.table td{padding:10px;border-bottom:1px solid var(--line);white-space:nowrap}.table td.num{text-align:right;font-variant-numeric:tabular-nums}.linkbtn{color:#c4b5fd;background:transparent;padding:0}.notice{border:1px solid #3f3f46;background:#111113;border-radius:14px;padding:12px;color:#d4d4d8}.ok{color:var(--green)}.bad{color:var(--red)}.hidden{display:none!important}
    @media(min-width:760px){.wrap{padding:24px}.layout{grid-template-columns:370px 1fr}.form-grid{grid-template-columns:repeat(2,1fr)}.rates{grid-template-columns:repeat(3,1fr)}.kpis{grid-template-columns:repeat(4,1fr)}}
    @media(min-width:1100px){.form-grid{grid-template-columns:repeat(5,1fr)}.span2{grid-column:span 2}.two{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="spread">
        <div>
          <h1 class="title">Connected Battery CF App</h1>
          <p class="sub">Materialien → Batches → Elektroden → C‑Raten. Lokal gespeichert, kostenlos, Fold‑freundlich.</p>
        </div>
        <div class="row">
          <button class="btn primary" id="addElectrodeTop">＋ Elektrode</button>
          <button class="btn" id="addBatchTop">▣ Batch</button>
          <button class="btn" id="addMaterialTop">▤ Material</button>
          <button class="btn" id="exportBtn">Export JSON</button>
          <label class="btn">Import JSON<input class="hidden" type="file" accept="application/json,.json" id="importFile"></label>
          <button class="btn danger" id="resetBtn">Reset</button>
        </div>
      </div>
    </section>

    <nav class="tabs" id="tabs"></nav>

    <main id="app"></main>
  </div>
<script>
const DEFAULT_RATES=[['C/20',1/20],['C/10',1/10],['C/5',1/5],['C/2',1/2],['1C',1],['2C',2],['4C',4],['5C',5],['6C',6],['10C',10]];
const STARTER={materials:[{id:'NFM-111',name:'Na(Ni1/3Fe1/3Mn1/3)O2',shortName:'NFM',chemistry:'Na-ion cathode',amFraction:0.8,theoreticalCapacity:120,defaultVoltage:'2.0–4.2 V vs. Na/Na+',defaultReference:'Na/Na+',defaultElectrolyte:'NaClO4 in EC:PC',notes:'Layered oxide cathode. Adjust capacity after practical calibration.'},{id:'NVP',name:'Na3V2(PO4)3/C',shortName:'NVP/C',chemistry:'Na-ion cathode',amFraction:0.8,theoreticalCapacity:117.6,defaultVoltage:'2.5–4.0 V vs. Na/Na+',defaultReference:'Na/Na+',defaultElectrolyte:'NaClO4 / NaPF6 electrolyte',notes:'NASICON cathode.'},{id:'GRAPHITE',name:'Graphite',shortName:'Graphite',chemistry:'Li-ion anode',amFraction:0.95,theoreticalCapacity:372,defaultVoltage:'0.005–1.5 V vs. Li/Li+',defaultReference:'Li/Li+',defaultElectrolyte:'1M LiPF6 in EC:EMC:DEC',notes:'Default graphite half-cell values.'}],batches:[{id:'NFM-P01',materialId:'NFM-111',project:'NFM Pechini',batchName:'baseline water route',recipe:'80:10:10',coating:'none',date:'',notes:'Use as template for NFM batches.'},{id:'NVP-C01',materialId:'NVP',project:'NVP cathode',batchName:'NVP/C baseline',recipe:'80:10:10',coating:'none',date:'',notes:'Use as template for NVP batches.'}],electrodes:[{id:'NFM-P01-E01',batchId:'NFM-P01',grossMg:'',emptyFoilMg:'43.0',diameterMm:'15',measuredAmMassMg:'',label:'',notes:''}],settings:{defaultEmptyFoilMg:'43.0',defaultDiameterMm:'15'}};
const KEY='battery-connected-cf-app-v3';
let state=load(); let tab='quick'; let selectedElectrodeId=state.electrodes[0]?.id||''; let query='';
function clone(x){return JSON.parse(JSON.stringify(x))} function load(){try{return JSON.parse(localStorage.getItem(KEY))||clone(STARTER)}catch{return clone(STARTER)}} function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function n(v){if(v===null||v===undefined||v==='')return null; const m=String(v).replace(',','.').match(/-?\d+(\.\d+)?/); return m?Number(m[0]):null} function fmt(x,d=3){if(x===null||x===undefined||Number.isNaN(x))return '—'; return Number(x).toFixed(d).replace(/\.0+$/,'').replace(/(\.\d*?)0+$/,'$1')} function uid(p){return p+'-'+Math.random().toString(36).slice(2,7).toUpperCase()} function area(mm){const d=n(mm); if(!d)return null; const cm=d/10; return Math.PI*Math.pow(cm/2,2)}
function mat(id){return state.materials.find(x=>x.id===id)||null} function bat(id){return state.batches.find(x=>x.id===id)||null} function ele(id){return state.electrodes.find(x=>x.id===id)||null} function joined(){return state.electrodes.map(e=>{const b=bat(e.batchId)||{}; const m=mat(b.materialId)||{}; return {...e,batch:b,material:m}})}
function calc(e,m){if(!e||!m)return {currents:[]}; const gross=n(e.grossMg), empty=n(e.emptyFoilMg), measured=n(e.measuredAmMassMg), amF=n(m.amFraction)??0.8, cap=n(m.theoreticalCapacity)??120, ar=area(e.diameterMm); const net=(gross!==null&&empty!==null)?gross-empty:null; const am=measured!==null?measured:(net!==null?net*amF:null); const load=(am!==null&&ar)?am/ar:null; const one=(am!==null)?(am/1000)*cap:null; return {gross,empty,measured,amFraction:amF,cap,area:ar,netCoatingMg:net,amMassMg:am,arealMgCm2:load,oneC_mA:one,currents:DEFAULT_RATES.map(([label,factor])=>({label,current:one!==null?one*factor:null}))}}
function current(){const e=ele(selectedElectrodeId)||state.electrodes[0]||null; if(e&&!selectedElectrodeId)selectedElectrodeId=e.id; const b=e?bat(e.batchId):null; const m=b?mat(b.materialId):null; return {e,b,m,c:calc(e,m)}}
function cfLine(e,b,m,c){if(!e||!b||!m)return ''; return [e.id,b.id,m.shortName||m.name,`m_AM=${fmt(c.amMassMg,4)} mg`,`loading=${fmt(c.arealMgCm2,3)} mg/cm²`,`1C=${fmt(c.oneC_mA,4)} mA`,`C/10=${fmt(c.oneC_mA?c.oneC_mA/10:null,4)} mA`,`C/5=${fmt(c.oneC_mA?c.oneC_mA/5:null,4)} mA`,`C/2=${fmt(c.oneC_mA?c.oneC_mA/2:null,4)} mA`,`2C=${fmt(c.oneC_mA?c.oneC_mA*2:null,4)} mA`,m.defaultVoltage?`V=${m.defaultVoltage}`:'',m.defaultReference||''].filter(Boolean).join(' | ')}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))} function opt(list,val,label){return list.map(x=>`<option value="${esc(val(x))}">${esc(label(x))}</option>`).join('')}
function setTab(t){tab=t; render()} function commit(){save(); render()}
function render(){renderTabs(); const root=document.getElementById('app'); if(tab==='quick')root.innerHTML=quickHtml(); if(tab==='batches')root.innerHTML=batchesHtml(); if(tab==='materials')root.innerHTML=materialsHtml(); if(tab==='history')root.innerHTML=historyHtml(); bind()}
function renderTabs(){document.getElementById('tabs').innerHTML=[['quick','Quick CF'],['batches','Batches'],['materials','Materials'],['history','History']].map(([id,l])=>`<button class="tab ${tab===id?'active':''}" data-tab="${id}">${l}</button>`).join('')}
function field(label,id,value,primary=false,placeholder='',span2=false){return `<label class="field ${primary?'primary':''} ${span2?'span2':''}"><span>${esc(label)}</span><input id="${id}" value="${esc(value??'')}" placeholder="${esc(placeholder)}" inputmode="decimal"></label>`}
function select(label,id,value,options){return `<label class="field"><span>${esc(label)}</span><select id="${id}">${options.map(([v,l])=>`<option value="${esc(v)}" ${String(v)===String(value)?'selected':''}>${esc(l)}</option>`).join('')}</select></label>`}
function quickHtml(){const {e,b,m,c}=current(); const list=joined().filter(r=>!query||[r.id,r.label,r.batch?.id,r.batch?.project,r.batch?.batchName,r.material?.shortName,r.material?.name].join(' ').toLowerCase().includes(query.toLowerCase())); if(!e)return `<div class="card">Noch keine Elektrode vorhanden. <button class="btn primary" data-action="addE">Elektrode anlegen</button></div>`; return `<div class="grid layout"><aside class="card"><div class="spread"><h2 class="section-title">Elektroden</h2><button class="btn primary" data-action="addE">＋ Neu</button></div><input class="search" id="search" value="${esc(query)}" placeholder="ID, Batch, Material suchen…"><div class="picker-list">${list.map(r=>`<button class="pick ${r.id===selectedElectrodeId?'active':''}" data-selecte="${esc(r.id)}"><b>${esc(r.id)}</b><span>${esc(r.batch?.id)} · ${esc(r.material?.shortName||r.material?.name)}</span><span>${esc(r.batch?.project||r.batch?.batchName||'no project')}</span></button>`).join('')}</div></aside><section class="grid"><div class="card"><div class="spread"><h2 class="section-title">Schnelleingabe</h2><button class="btn danger" data-action="delE">🗑 Elektrode löschen</button></div><div class="form-grid">${select('Batch','e_batch',e.batchId,state.batches.map(b=>[b.id,`${b.id} · ${b.project||b.batchName||''}`]))}${field('Elektroden-ID','e_id',e.id)}${field('Gewogen inkl. Foil [mg]','e_gross',e.grossMg,true,'49.23')}${field('Leere Foil/Disk [mg]','e_empty',e.emptyFoilMg)}${field('Disk Ø [mm]','e_diam',e.diameterMm)}${field('AM mass direkt [mg], optional','e_am',e.measuredAmMassMg,false,'überschreibt Rechnung')}${field('Label / Cell name','e_label',e.label)}${field('Notizen','e_notes',e.notes,false,'',true)}</div><p class="small">Verknüpfung: Elektrode zieht AM-Anteil und theoretische Kapazität aus dem Material des gewählten Batches.</p></div><div class="kpis"><div class="kpi"><div class="l">Net coating</div><div class="v">${fmt(c.netCoatingMg,4)} mg</div></div><div class="kpi hot"><div class="l">AM mass</div><div class="v">${fmt(c.amMassMg,4)} mg</div></div><div class="kpi"><div class="l">Areal loading</div><div class="v">${fmt(c.arealMgCm2,3)} mg/cm²</div></div><div class="kpi hot"><div class="l">1C current</div><div class="v">${fmt(c.oneC_mA,4)} mA</div></div></div><div class="card"><div class="grid two"><div><h2 class="section-title">Verbundene Daten</h2>${info([['Electrode',e.id],['Batch',b?.id],['Project',b?.project],['Material',m?.name],['Recipe',b?.recipe],['AM fraction',fmt(c.amFraction,3)],['Area',`${fmt(c.area,3)} cm²`],['Theo. capacity',`${fmt(c.cap,1)} mAh/g`],['Voltage',m?.defaultVoltage],['Electrolyte',m?.defaultElectrolyte],['Reference',m?.defaultReference],['Coating',b?.coating]])}</div><div><h2 class="section-title">C‑Rate Currents</h2><div class="rates">${c.currents.map(r=>`<div class="rate"><div class="l">${r.label}</div><div class="v">${fmt(r.current,4)} mA</div></div>`).join('')}</div></div></div></div><div class="card"><div class="spread"><h2 class="section-title">CF copy line</h2><button class="btn primary" data-action="copy">⧉ Kopieren</button></div><textarea readonly class="copybox" id="cfbox">${esc(cfLine(e,b,m,c))}</textarea></div></section></div>`}
function info(rows){return `<div class="info">${rows.map(([k,v])=>`<div class="info-row"><div class="info-k">${esc(k)}</div><div class="info-v">${esc(v||'—')}</div></div>`).join('')}</div>`}
function batchesHtml(){return `<div class="card"><div class="spread"><h2 class="section-title">Batches</h2><button class="btn primary" data-action="addB">＋ Batch</button></div><div class="manager-list">${state.batches.map(b=>`<div class="manager-item" data-bid="${esc(b.id)}"><div class="form-grid">${field('Batch ID',`b_id_${b.id}`,b.id)}${select('Material',`b_mat_${b.id}`,b.materialId,state.materials.map(m=>[m.id,`${m.id} · ${m.shortName||m.name}`]))}${field('Project',`b_project_${b.id}`,b.project)}${field('Batch name',`b_name_${b.id}`,b.batchName)}${field('Recipe',`b_recipe_${b.id}`,b.recipe)}${field('Coating',`b_coating_${b.id}`,b.coating)}${field('Date',`b_date_${b.id}`,b.date)}${field('Notes',`b_notes_${b.id}`,b.notes,false,'',true)}</div><p><button class="linkbtn bad" data-delb="${esc(b.id)}">Batch löschen</button></p></div>`).join('')}</div></div>`}
function materialsHtml(){return `<div class="card"><div class="spread"><h2 class="section-title">Materials</h2><button class="btn primary" data-action="addM">＋ Material</button></div><div class="manager-list">${state.materials.map(m=>`<div class="manager-item" data-mid="${esc(m.id)}"><div class="form-grid">${field('Material ID',`m_id_${m.id}`,m.id)}${field('Short name',`m_short_${m.id}`,m.shortName)}${field('Full name',`m_name_${m.id}`,m.name)}${field('Chemistry',`m_chem_${m.id}`,m.chemistry)}${field('AM fraction',`m_amf_${m.id}`,m.amFraction)}${field('Theo. capacity [mAh/g]',`m_cap_${m.id}`,m.theoreticalCapacity)}${field('Voltage',`m_volt_${m.id}`,m.defaultVoltage)}${field('Reference',`m_ref_${m.id}`,m.defaultReference)}${field('Electrolyte',`m_el_${m.id}`,m.defaultElectrolyte)}${field('Notes',`m_notes_${m.id}`,m.notes,false,'',true)}</div></div>`).join('')}</div></div>`}
function historyHtml(){return `<div class="card"><h2 class="section-title">History / Phone View</h2><div class="table-wrap"><table class="table"><thead><tr><th>Electrode</th><th>Batch</th><th>Material</th><th>AM [mg]</th><th>Loading</th><th>1C [mA]</th><th>Open</th></tr></thead><tbody>${joined().map(r=>{const c=calc(r,r.material); return `<tr><td><b>${esc(r.id)}</b></td><td>${esc(r.batch?.id)}</td><td>${esc(r.material?.shortName||r.material?.name)}</td><td class="num">${fmt(c.amMassMg,4)}</td><td class="num">${fmt(c.arealMgCm2,3)}</td><td class="num">${fmt(c.oneC_mA,4)}</td><td><button class="linkbtn" data-open="${esc(r.id)}">öffnen</button></td></tr>`}).join('')}</tbody></table></div></div>`}
function addE(){const {b}=current(); const ne={id:uid('EL'),batchId:b?.id||state.batches[0]?.id||'',grossMg:'',emptyFoilMg:state.settings.defaultEmptyFoilMg,diameterMm:state.settings.defaultDiameterMm,measuredAmMassMg:'',label:'',notes:''}; state.electrodes.unshift(ne); selectedElectrodeId=ne.id; tab='quick'; commit()} function addB(){const {m}=current(); state.batches.unshift({id:uid('BATCH'),materialId:m?.id||state.materials[0]?.id||'',project:'',batchName:'',recipe:'80:10:10',coating:'',date:'',notes:''}); tab='batches'; commit()} function addM(){state.materials.unshift({id:uid('MAT'),name:'New material',shortName:'',chemistry:'',amFraction:0.8,theoreticalCapacity:120,defaultVoltage:'',defaultReference:'',defaultElectrolyte:'',notes:''}); tab='materials'; commit()}
function bind(){document.querySelectorAll('[data-tab]').forEach(x=>x.onclick=()=>setTab(x.dataset.tab)); document.querySelectorAll('[data-action="addE"]').forEach(x=>x.onclick=addE); document.querySelectorAll('[data-action="addB"]').forEach(x=>x.onclick=addB); document.querySelectorAll('[data-action="addM"]').forEach(x=>x.onclick=addM); document.querySelectorAll('[data-selecte]').forEach(x=>x.onclick=()=>{selectedElectrodeId=x.dataset.selecte;render()}); document.querySelectorAll('[data-open]').forEach(x=>x.onclick=()=>{selectedElectrodeId=x.dataset.open;tab='quick';render()}); const search=document.getElementById('search'); if(search)search.oninput=e=>{query=e.target.value;render()}; const {e}=current(); if(e){bindVal('e_batch',v=>e.batchId=v); bindVal('e_id',v=>{e.id=v;selectedElectrodeId=v}); bindVal('e_gross',v=>e.grossMg=v); bindVal('e_empty',v=>e.emptyFoilMg=v); bindVal('e_diam',v=>e.diameterMm=v); bindVal('e_am',v=>e.measuredAmMassMg=v); bindVal('e_label',v=>e.label=v); bindVal('e_notes',v=>e.notes=v); document.querySelector('[data-action="delE"]')?.addEventListener('click',()=>{state.electrodes=state.electrodes.filter(x=>x.id!==e.id);selectedElectrodeId=state.electrodes[0]?.id||'';commit()}); document.querySelector('[data-action="copy"]')?.addEventListener('click',async()=>{const txt=document.getElementById('cfbox')?.value||''; try{await navigator.clipboard.writeText(txt); alert('CF-Zeile kopiert.')}catch{document.getElementById('cfbox')?.select(); alert('Kopieren blockiert: Text wurde markiert, bitte manuell kopieren.')}})}
 if(tab==='batches'){state.batches.forEach(b=>{bindVal(`b_id_${b.id}`,v=>{const old=b.id;b.id=v;state.electrodes.forEach(e=>{if(e.batchId===old)e.batchId=v})});bindVal(`b_mat_${b.id}`,v=>b.materialId=v);bindVal(`b_project_${b.id}`,v=>b.project=v);bindVal(`b_name_${b.id}`,v=>b.batchName=v);bindVal(`b_recipe_${b.id}`,v=>b.recipe=v);bindVal(`b_coating_${b.id}`,v=>b.coating=v);bindVal(`b_date_${b.id}`,v=>b.date=v);bindVal(`b_notes_${b.id}`,v=>b.notes=v)});document.querySelectorAll('[data-delb]').forEach(btn=>btn.onclick=()=>{const id=btn.dataset.delb;if(state.electrodes.some(e=>e.batchId===id))return alert('Batch wird von Elektroden benutzt. Erst Elektroden umhängen/löschen.');state.batches=state.batches.filter(b=>b.id!==id);commit()})}
 if(tab==='materials'){state.materials.forEach(m=>{bindVal(`m_id_${m.id}`,v=>{const old=m.id;m.id=v;state.batches.forEach(b=>{if(b.materialId===old)b.materialId=v})});bindVal(`m_short_${m.id}`,v=>m.shortName=v);bindVal(`m_name_${m.id}`,v=>m.name=v);bindVal(`m_chem_${m.id}`,v=>m.chemistry=v);bindVal(`m_amf_${m.id}`,v=>m.amFraction=v);bindVal(`m_cap_${m.id}`,v=>m.theoreticalCapacity=v);bindVal(`m_volt_${m.id}`,v=>m.defaultVoltage=v);bindVal(`m_ref_${m.id}`,v=>m.defaultReference=v);bindVal(`m_el_${m.id}`,v=>m.defaultElectrolyte=v);bindVal(`m_notes_${m.id}`,v=>m.notes=v)})}}
function bindVal(id,fn){const el=document.getElementById(id); if(el)el.onchange=ev=>{fn(ev.target.value);commit()}}
document.getElementById('addElectrodeTop').onclick=addE; document.getElementById('addBatchTop').onclick=addB; document.getElementById('addMaterialTop').onclick=addM; document.getElementById('resetBtn').onclick=()=>{if(confirm('Alle lokalen Daten zurücksetzen?')){state=clone(STARTER);selectedElectrodeId=state.electrodes[0].id;save();render()}}; document.getElementById('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='battery-cf-data.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000)}; document.getElementById('importFile').onchange=async e=>{const f=e.target.files[0]; if(!f)return; try{const obj=JSON.parse(await f.text()); if(!obj.materials||!obj.batches||!obj.electrodes)throw new Error('bad'); state=obj; selectedElectrodeId=state.electrodes[0]?.id||''; save(); render()}catch{alert('JSON konnte nicht importiert werden.')}};
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
render();
</script>
</body>
</html>
